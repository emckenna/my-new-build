<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper Beast 2026 — Build Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 id="build-name">Loading...</h1>
  <div class="subtitle" id="build-desc"></div>

  <div class="summary">
    <div class="card">
      <div class="label">Build Total</div>
      <div class="value neutral" id="total">—</div>
      <div id="total-sparkline" style="margin-top:0.5rem"></div>
    </div>
    <div class="card">
      <div class="label">Budget</div>
      <div class="value neutral" id="budget">—</div>
    </div>
    <div class="card">
      <div class="label">vs Budget</div>
      <div class="value neutral" id="vs-budget">—</div>
    </div>
    <div class="card">
      <div class="label">Last Updated</div>
      <div class="value neutral" style="font-size:1rem;padding-top:0.4rem" id="last-updated">—</div>
    </div>
  </div>

  <div id="error"></div>

  <table id="parts-table">
    <thead>
      <tr>
        <th>Part</th>
        <th>Category</th>
        <th>NE</th>
        <th>MC</th>
        <th>AMZ</th>
        <th>Avg</th>
        <th>Lowest</th>
        <th>Movement</th>
        <th>Trend</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="parts-body"></tbody>
  </table>

  <div class="meta" id="meta"></div>

  <script>
    const fmt = (n) => n != null ? '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0}) : '—';

    function movBadge(mov) {
      const labels = { up: '▲ Up', down: '▼ Down', flat: '— Flat', new: '● New', fixed: 'Fixed' };
      return `<span class="badge ${mov}">${labels[mov] ?? mov}</span>`;
    }

    function retailerLink(url, label, price) {
      if (!url) return '—';
      const display = price != null ? fmt(price) : label;
      return `<a href="${url}" target="_blank" rel="noopener">${display}</a>`;
    }

    function nameCell(name, url) {
      return url ? `<a href="${url}" target="_blank" rel="noopener">${name}</a>` : name;
    }

    function copyBtn(name) {
      return `<button class="copy-btn" onclick="copyText('${name.replace(/'/g, "\\'")}')" title="Copy name">⎘</button>`;
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
    }

    function sparkline(history) {
      if (!history || history.length === 0) return '—';
      const W = 80, H = 28, PAD = 3;
      const series = [
        { key: 'newegg', color: '#60a5fa' },
        { key: 'microcenter', color: '#a78bfa' },
      ];

      const allVals = [];
      for (const s of series)
        for (const d of history)
          if (d[s.key] != null) allVals.push(d[s.key]);
      if (allVals.length === 0) return '—';

      let minV = Math.min(...allVals);
      let maxV = Math.max(...allVals);
      if (minV === maxV) { minV -= 1; maxV += 1; }

      const n = history.length;
      const xScale = n > 1 ? (W - 2 * PAD) / (n - 1) : 0;
      const yScale = (H - 2 * PAD) / (maxV - minV);
      const px = i => (PAD + i * xScale).toFixed(1);
      const py = v => (H - PAD - (v - minV) * yScale).toFixed(1);

      let paths = '';
      for (const s of series) {
        const pts = history
          .map((d, i) => d[s.key] != null ? `${px(i)},${py(d[s.key])}` : null)
          .filter(Boolean);
        if (pts.length === 0) continue;
        if (pts.length === 1) {
          const [cx, cy] = pts[0].split(',');
          paths += `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${s.color}"/>`;
        } else {
          paths += `<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
          const [cx, cy] = pts[pts.length - 1].split(',');
          paths += `<circle cx="${cx}" cy="${cy}" r="2" fill="${s.color}"/>`;
        }
      }
      return paths ? `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">${paths}</svg>` : '—';
    }

    function buildTotalHistory(histMap, partIds, fixedTotal) {
      const dateSet = new Set();
      for (const id of partIds)
        for (const e of histMap[id] ?? []) dateSet.add(e.date);
      const dates = [...dateSet].sort();

      const lastKnown = {};
      return dates.flatMap(date => {
        for (const id of partIds) {
          const e = (histMap[id] ?? []).find(e => e.date === date);
          if (e?.lowest != null) lastKnown[id] = e.lowest;
        }
        const varTotal = Object.values(lastKnown).reduce((a, b) => a + b, 0);
        return Object.keys(lastKnown).length > 0
          ? [{ date, total: varTotal + fixedTotal }]
          : [];
      });
    }

    function totalSparkline(data) {
      if (!data || data.length < 2) return '';
      const W = 140, H = 32, PAD = 3;
      const vals = data.map(d => d.total);
      let minV = Math.min(...vals), maxV = Math.max(...vals);
      if (minV === maxV) { minV -= 1; maxV += 1; }

      const n = data.length;
      const xScale = (W - 2 * PAD) / (n - 1);
      const yScale = (H - 2 * PAD) / (maxV - minV);
      const px = i => (PAD + i * xScale).toFixed(1);
      const py = v => (H - PAD - (v - minV) * yScale).toFixed(1);

      const pts = data.map((d, i) => `${px(i)},${py(d.total)}`).join(' ');
      const trend = vals[vals.length - 1] <= vals[0] ? '#4ade80' : '#f87171';
      const [cx, cy] = pts.split(' ').pop().split(',');
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">` +
        `<polyline points="${pts}" fill="none" stroke="${trend}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>` +
        `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${trend}"/>` +
        `</svg>`;
    }

    async function loadJSON(path) {
      const r = await fetch(path + '?t=' + Date.now());
      if (!r.ok) throw new Error(`${path} returned ${r.status}`);
      return r.json();
    }

    async function main() {
      let parts, prices, history;
      try {
        [parts, prices, history] = await Promise.all([
          loadJSON('parts.json'),
          loadJSON('prices.json').catch(() => null),
          loadJSON('price_history.json').catch(() => null),
        ]);
      } catch (e) {
        document.getElementById('error').textContent = 'Error loading data: ' + e.message;
        return;
      }
      const histMap = history ?? {};

      const build = parts.build;
      document.getElementById('build-name').textContent = build.name;
      document.getElementById('build-desc').textContent = build.description;
      document.getElementById('budget').textContent = fmt(build.budget);

      const priceMap = prices?.parts ?? {};
      const tbody = document.getElementById('parts-body');
      let variableTotal = 0;

      tbody.insertAdjacentHTML('beforeend',
        `<tr><td colspan="10" class="section-label">Tracked Parts</td></tr>`);

      for (const part of parts.parts) {
        const p = priceMap[part.id] ?? {};
        const nePrice = p.newegg ?? null;
        const mcPrice = p.microcenter ?? null;
        const lowest = p.lowest_price ?? null;
        const mov = p.movement ?? 'new';
        if (lowest != null) variableTotal += lowest;

        const availPrices = [nePrice, mcPrice].filter(x => x != null);
        const avg = availPrices.length > 0
          ? availPrices.reduce((a, b) => a + b, 0) / availPrices.length
          : null;

        const retailers = part.retailers ?? {};

        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${nameCell(part.name, part.url)}</td>
            <td>${part.category}</td>
            <td>${retailerLink(retailers.newegg, 'NE', nePrice)}</td>
            <td>${retailerLink(retailers.microcenter, 'MC', mcPrice)}</td>
            <td>${retailerLink(retailers.amazon, 'AMZ', null)}</td>
            <td>${fmt(avg)}</td>
            <td>${fmt(lowest)}</td>
            <td>${movBadge(mov)}</td>
            <td>${sparkline(histMap[part.id])}</td>
            <td>${copyBtn(part.name)}</td>
          </tr>
        `);
      }

      tbody.insertAdjacentHTML('beforeend',
        `<tr><td colspan="10" class="section-label">Fixed-Price Components</td></tr>`);

      let fixedTotal = 0;
      for (const extra of parts.extras) {
        fixedTotal += extra.fixed_price;
        const er = extra.retailers ?? {};
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${nameCell(extra.name, extra.url)}</td>
            <td>${extra.category}</td>
            <td>${retailerLink(er.newegg, 'NE', null)}</td>
            <td>${retailerLink(er.microcenter, 'MC', null)}</td>
            <td>${retailerLink(er.amazon, 'AMZ', null)}</td>
            <td>${fmt(extra.fixed_price)}</td>
            <td>${fmt(extra.fixed_price)}</td>
            <td>${movBadge('fixed')}</td>
            <td></td>
            <td>${copyBtn(extra.name)}</td>
          </tr>
        `);
      }

      const grandTotal = variableTotal + fixedTotal;
      const vsBudget = build.budget - grandTotal;

      tbody.insertAdjacentHTML('beforeend', `
        <tr style="font-weight:700;border-top:2px solid #2d3748;">
          <td colspan="6">Grand Total</td>
          <td>${variableTotal > 0 ? fmt(grandTotal) : 'Prices pending'}</td>
          <td><span style="color:${vsBudget >= 0 ? '#4ade80' : '#f87171'};font-size:0.8rem">${variableTotal > 0 ? (vsBudget >= 0 ? fmt(vsBudget) + ' under budget' : fmt(Math.abs(vsBudget)) + ' over budget') : ''}</span></td>
          <td></td>
          <td></td>
        </tr>
      `);

      const totalEl = document.getElementById('total');
      const vsEl = document.getElementById('vs-budget');

      totalEl.textContent = variableTotal > 0 ? fmt(grandTotal) : 'Prices pending';
      vsEl.textContent = variableTotal > 0 ? (vsBudget >= 0 ? fmt(vsBudget) + ' under' : fmt(Math.abs(vsBudget)) + ' over') : '—';
      vsEl.className = 'value ' + (vsBudget >= 0 ? 'green' : 'red');

      const partIds = parts.parts.map(p => p.id);
      const totalHistory = buildTotalHistory(histMap, partIds, fixedTotal);
      document.getElementById('total-sparkline').innerHTML = totalSparkline(totalHistory);

      if (prices?.last_fetched) {
        const d = new Date(prices.last_fetched);
        document.getElementById('last-updated').textContent = d.toLocaleString();
        document.getElementById('meta').textContent = `Prices last fetched: ${d.toUTCString()}`;
      } else {
        document.getElementById('last-updated').textContent = 'Not yet fetched';
      }
    }

    main();
  </script>
</body>
</html>
